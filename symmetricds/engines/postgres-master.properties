# =============================================================================
# SymmetricDS - Nodo Maestro (PostgreSQL)
# Este nodo es el registration server y la fuente de datos
# =============================================================================

engine.name=postgres-master

# --- Identificación del nodo ---
group.id=master
external.id=master-000

# --- Registration Server ---
# Vacío = este nodo ES el registration server
registration.url=
sync.url=http://symmetricds:31415/sync/postgres-master

# --- Conexión a PostgreSQL ---
db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://postgres:5432/profedex
db.user=profedex
db.password=profedex_secret

# --- Configuración de sincronización ---
job.push.period.time.ms=5000
job.pull.period.time.ms=5000
job.routing.period.time.ms=5000

# Crear carga inicial antes de activar triggers
initial.load.create.first=false
initial.load.delete.first=false

# Auto-registrar nodos que se conecten
auto.registration=true

# Enviar carga inicial automaticamente al registrar un nodo
auto.reload=true
auto.reload.reverse=false

# Permitir upgrade automático de las tablas internas de SymmetricDS
# NECESARIO cuando hay tablas sym_* de una versión anterior en la BD
auto.sync.configuration=true
auto.config.database=true

# Prohibir al cargador de datos crear o alterar tablas
dataloader.create.table.if.doesnt.exist=false
dataloader.create.table.alter.if.column.missing=false

# Escanear nuevos engines cada 10 segundos (para detectar mysql-replica)
engine.deploy.period.ms=10000
