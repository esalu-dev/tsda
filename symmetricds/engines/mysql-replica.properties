# =============================================================================
# SymmetricDS - Nodo Replica (MySQL)
# Este nodo recibe datos del master PostgreSQL vía push
# =============================================================================

engine.name=mysql-replica

# --- Identificación del nodo ---
group.id=replica
external.id=replica-001

# --- URLs ---
sync.url=http://symmetricds:31415/sync/mysql-replica
registration.url=http://symmetricds:31415/sync/postgres-master

# --- Conexión a MySQL ---
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://mysql:3306/profedex?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.user=profedex
db.password=profedex_secret

# --- Configuración de sincronización ---
job.push.period.time.ms=10000
job.pull.period.time.ms=10000
job.routing.period.time.ms=10000

auto.registration=false
auto.reload=false
dataloader.create.table.if.doesnt.exist=false
dataloader.create.table.alter.if.column.missing=false
